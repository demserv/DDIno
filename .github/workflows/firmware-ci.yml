name: Firmware CI

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.3.2
    defaults:
      run:
        working-directory: firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production firmware
        run: idf.py set-target esp32s3 && idf.py build

      - name: Compile Unity test component
        run: |
          idf.py -B build-test -DTEST_COMPONENTS=test -DTEST_EXCLUDE_COMPONENTS=main set-target esp32s3
          ninja -C build-test esp-idf/test/libtest.a

      - name: Rebuild production after test sdkconfig
        run: idf.py build
